<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

#root {
  background: #000;
  height: 100vh;
  height: 100dvh; /* excludes browser chrome on mobile */
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  padding: 2.5rem 3rem;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  overflow: hidden;
}

#scene { position: relative; width: 100%; height: 100%; }
#canvas { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
#text-layer {
  font-size: 30px; font-weight: 400; color: #fff;
  line-height: 1.5; letter-spacing: -0.01em;
  white-space: pre-wrap; word-break: break-word;
  min-height: 46px; position: relative; z-index: 1;
}
#sizer {
  position: fixed; visibility: hidden; top: -9999px; left: -9999px;
  font-size: 30px; font-weight: 400;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  letter-spacing: -0.01em; white-space: pre;
}
#controls { margin-top: 1.5rem; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
#mic-btn {
  background: #1a1a1a; border: 0.5px solid #444; color: #fff;
  padding: 10px 20px; border-radius: 999px; font-size: 14px;
  cursor: pointer; display:flex; align-items:center; gap:8px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
#mic-btn:hover { background: #2a2a2a; }
#mic-btn.on { border-color: #a855f7; color: #d8b4fe; }
#type-btn {
  background: #1a1a1a; border: 0.5px solid #444; color: #fff;
  padding: 10px 20px; border-radius: 999px; font-size: 14px;
  cursor: pointer; display:flex; align-items:center; gap:8px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
#type-btn:hover { background: #2a2a2a; }
#type-btn.on { border-color: #38bdf8; color: #7dd3fc; }
#clear-btn {
  background: transparent; border: 0.5px solid #333; color: #555;
  padding: 10px 16px; border-radius: 999px; font-size: 14px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
#clear-btn:hover { border-color: #555; color: #888; }
.dot { width:8px; height:8px; border-radius:50%; background:#555; flex-shrink:0; }
#mic-btn.on .dot { background:#a855f7; animation: pulse 1s infinite; }
#type-btn.on .dot { background:#38bdf8; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
#status { font-size:13px; color:#555; }
#version { margin-top:0.75rem; font-size:11px; color:#333; letter-spacing:0.04em; }
    #version a {
    color: inherit; text-decoration: underline; text-underline-offset: 3px;
    transition: color 0.15s; cursor: pointer;
  }
  #version a:hover { color: white; }
#type-input-wrap { display:none; margin-top:1rem; width:100%; }
#type-input-wrap.visible { display:block; }
#type-input {
  background:#111; border:0.5px solid #333; color:#fff;
  padding:10px 16px; border-radius:8px;
  font-size: max(16px, 1em);
  width:100%; outline:none;
  font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
}
#type-input:focus { border-color:#38bdf8; }
#type-hint { font-size:12px; color:#444; margin-top:6px; }

/* Mobile: input bar is fixed above the keyboard via JS */
@media (max-width: 600px) {
  #type-input-wrap.visible {
    display: block;
    position: fixed;
    left: 0; right: 0;
    padding: 10px 16px 12px;
    background: #000;
    border-top: 0.5px solid #222;
    z-index: 9999;
    /* bottom is set dynamically by JS to sit above keyboard */
    bottom: 0;
  }
  #type-input {
    font-size: 16px;
    padding: 10px 14px;
  }
  #type-hint { font-size: 11px; }
}

/* ── Mobile overrides ── */
@media (max-width: 600px) {
  #root {
    padding: 2rem 1.5rem 0;
    border-radius: 0;
    justify-content: flex-start;
    padding-top: 3rem;
    /* Leave space at the bottom for fixed controls + input bar */
    padding-bottom: 120px;
  }

  #text-layer {
    font-size: 36px;
    min-height: 54px;
    line-height: 1.4;
  }

  #sizer {
    font-size: 36px;
  }

  /* Controls are fixed at the bottom on mobile, above the input bar */
  #controls {
    position: fixed;
    left: 0; right: 0;
    padding: 8px 16px;
    background: #000;
    z-index: 9998; /* just below input bar */
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 0;
    /* bottom set dynamically by JS */
    bottom: 0;
  }

  #mic-btn,
  #type-btn {
    padding: 9px 16px;
    font-size: 14px;
    min-height: 38px;
    gap: 7px;
  }

  #clear-btn {
    padding: 9px 14px;
    font-size: 14px;
    min-height: 38px;
  }

  .dot { width: 10px; height: 10px; }

  #status {
    font-size: 13px;
    margin-top: 0;
  }

  #type-input {
    font-size: 16px !important;
    padding: 8px 12px;
    border-radius: 8px;
  }

  #type-hint {
    font-size: 11px;
    line-height: 1.5;
  }

  #version {
    font-size: 12px;
    margin-top: 1rem;
  }
}

@media (max-width: 380px) {
  #text-layer {
    font-size: 30px;
    min-height: 46px;
  }

  #sizer {
    font-size: 30px;
  }

  #root {
    padding: 1.25rem 1rem;
  }
}

/* Landscape phone */
@media (max-height: 500px) and (orientation: landscape) {
  #root {
    padding: 1rem 1.5rem;
  }

  #controls {
    margin-top: 0.75rem;
  }

  #type-input-wrap {
    margin-top: 0.5rem;
  }
}
</style>

<div id="root">
  <div id="scene">
    <canvas id="canvas"></canvas>
    <div id="text-layer"><span id="display-text"></span><span id="caret-anchor">&#8203;</span></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scene = document.getElementById('scene');
const sizer = document.getElementById('sizer');
const displayEl = document.getElementById('display-text');
const caretAnchor = document.getElementById('caret-anchor');
const micBtn = document.getElementById('mic-btn');
const typeBtn = document.getElementById('type-btn');
const micLbl = document.getElementById('mic-lbl');
const typeLbl = document.getElementById('type-lbl');
const statusEl = document.getElementById('status');
const typeInputWrap = document.getElementById('type-input-wrap');
const typeInput = document.getElementById('type-input');
const isMobileDevice = () => window.innerWidth <= 600;

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) statusEl.textContent = 'Not supported — use Chrome';

let recog = null, micOn = false, typeOn = false;
let committedWords = [], pendingWords = [], interimQueued = [];
let lastFinalWordCount = 0;
let hue = 270;
let phase = 'idle';

let fwdStartX = 0, fwdStartY = 0, fwdWord = '', fwdWordW = 0, fwdRectW = 0, fwdSweepX = 0;
let erWord = '', erWordW = 0, erRightX = 0, erLeftX = 0, erCursorX = 0, erY = 0, erH = 0;

// Dynamically read font size from computed style so canvas matches text layer
function getFontSize() {
  return parseFloat(getComputedStyle(document.getElementById('text-layer')).fontSize);
}

let FS = getFontSize();
let LH = FS * 1.5;
const SPEED = 5;

function syncFontMetrics() {
  FS = getFontSize();
  LH = FS * 1.5;
  sizer.style.fontSize = FS + 'px';
}

function measure(t) { sizer.textContent = t; return sizer.getBoundingClientRect().width; }

function syncCanvas() {
  syncFontMetrics();
  canvas.width = scene.offsetWidth;
  canvas.height = Math.max(scene.offsetHeight, LH + 20);
}

function getCaretPos() {
  const sceneRect = scene.getBoundingClientRect();
  const r = caretAnchor.getBoundingClientRect();
  return {
    x: r.left - sceneRect.left,
    y: r.top - sceneRect.top,
    h: r.height
  };
}

function posForText(txt) {
  const prev = displayEl.textContent;
  displayEl.textContent = txt;
  const pos = getCaretPos();
  displayEl.textContent = prev;
  return pos;
}

function rRect(x, y, w, h, r) {
  if (w <= 0) return;
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawColorRect(rx, ry, rw, rh, gradDir) {
  if (rw < 1) return;
  const bx=rx+rw/2, by=ry+rh/2;
  const bloom=ctx.createRadialGradient(bx,by,0,bx,by,rw+28);
  bloom.addColorStop(0,`hsla(${hue},80%,70%,0.2)`);
  bloom.addColorStop(1,`hsla(${hue},80%,70%,0)`);
  ctx.beginPath(); ctx.ellipse(bx,by,rw+28,rh+20,0,0,Math.PI*2);
  ctx.fillStyle=bloom; ctx.fill();
  const x0=gradDir==='right'?rx:rx+rw, x1=gradDir==='right'?rx+rw:rx;
  const grad=ctx.createLinearGradient(x0,0,x1,0);
  grad.addColorStop(0,`hsla(${hue},80%,75%,0)`);
  grad.addColorStop(0.3,`hsla(${hue},80%,78%,0.45)`);
  grad.addColorStop(1,`hsla(${hue},80%,85%,0.88)`);
  rRect(rx,ry,rw,rh,4); ctx.fillStyle=grad; ctx.fill();
}

function drawWhiteRect(rx, ry, rw, rh, gradDir) {
  if (rw < 1) return;
  const bx=rx+rw/2, by=ry+rh/2;
  const bloom=ctx.createRadialGradient(bx,by,0,bx,by,rw+32);
  bloom.addColorStop(0,'rgba(255,255,255,0.18)');
  bloom.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.ellipse(bx,by,rw+32,rh+22,0,0,Math.PI*2);
  ctx.fillStyle=bloom; ctx.fill();
  const x0=gradDir==='left'?rx+rw:rx, x1=gradDir==='left'?rx:rx+rw;
  const grad=ctx.createLinearGradient(x0,0,x1,0);
  grad.addColorStop(0,'rgba(255,255,255,0)');
  grad.addColorStop(0.3,'rgba(255,255,255,0.35)');
  grad.addColorStop(1,'rgba(255,255,255,0.82)');
  rRect(rx,ry,rw,rh,4); ctx.fillStyle=grad; ctx.fill();
}

function drawColorCursor(x, y, h) {
  ctx.save();
  const active = phase !== 'idle';
  const listening = micOn || typeOn;
  if (!listening && !active) {
    ctx.fillStyle='#2a2a2a'; ctx.shadowBlur=0;
  } else if (active) {
    hue=(hue+1.2)%360;
    ctx.fillStyle=`hsl(${hue},90%,72%)`;
    ctx.shadowColor=`hsl(${hue},90%,70%)`; ctx.shadowBlur=12;
  } else {
    hue=(hue+0.5)%360;
    ctx.fillStyle=`hsl(${hue},70%,58%)`;
    ctx.shadowColor=`hsl(${hue},70%,58%)`; ctx.shadowBlur=5;
  }
  rRect(x, y, 2.5, h, 1.5); ctx.fill(); ctx.restore();
}

function drawWhiteCursor(x, y, h) {
  ctx.save();
  ctx.fillStyle='rgba(255,255,255,0.95)';
  ctx.shadowColor='rgba(255,255,255,0.8)'; ctx.shadowBlur=14;
  rRect(x, y, 2.5, h, 1.5); ctx.fill(); ctx.restore();
}

function committedStr() { return committedWords.join(' '); }

function drawFrame() {
  syncCanvas();
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (phase === 'expand') {
    fwdRectW += (fwdWordW - fwdRectW) * 0.15;
    if (fwdWordW - fwdRectW < 0.8) { fwdRectW = fwdWordW; phase = 'sweep'; fwdSweepX = fwdStartX; }
    const pos = getCaretPos();
    drawColorRect(fwdStartX, fwdStartY, fwdRectW, pos.h, 'right');
    drawColorCursor(fwdStartX + fwdRectW, fwdStartY, pos.h);

  } else if (phase === 'sweep') {
    fwdSweepX += SPEED;
    const remaining = (fwdStartX + fwdWordW) - fwdSweepX;
    if (remaining <= 2) {
      phase = 'idle';
      committedWords.push(fwdWord);
      displayEl.textContent = committedStr();
      if (eraseQueue > 0) { drainEraseQueue(); } else { tryNextWord(); }
    } else {
      const frac = 1 - remaining / fwdWordW;
      const partial = fwdWord.slice(0, Math.ceil(fwdWord.length * frac));
      const prefix = committedStr();
      displayEl.textContent = prefix + (prefix ? ' ' : '') + partial;
      const pos = getCaretPos();
      drawColorRect(fwdSweepX, fwdStartY, remaining, pos.h, 'right');
      drawColorCursor(fwdSweepX + remaining, fwdStartY, pos.h);
    }

  } else if (phase === 'erase_cover') {
    erCursorX -= SPEED * 1.2;
    if (erCursorX <= erLeftX) { erCursorX = erLeftX; phase = 'erase_wipe'; }
    const rw = erRightX - erCursorX;
    drawWhiteRect(erCursorX, erY, rw, erH, 'left');
    drawWhiteCursor(erCursorX, erY, erH);

  } else if (phase === 'erase_wipe') {
    erRightX -= SPEED * 1.2;
    const remaining = erRightX - erLeftX;
    if (remaining <= 2) {
      committedWords.pop();
      displayEl.textContent = committedStr();
      phase = 'idle';
      if (eraseQueue > 0) { drainEraseQueue(); } else { tryNextWord(); }
    } else {
      const frac = remaining / erWordW;
      const charsLeft = Math.ceil(erWord.length * frac);
      const partial = erWord.slice(0, charsLeft);
      const before = committedWords.slice(0,-1).join(' ');
      displayEl.textContent = before + (before ? ' ' : '') + partial;
      drawWhiteRect(erLeftX, erY, remaining, erH, 'left');
    }

  } else {
    const pos = getCaretPos();
    drawColorCursor(pos.x, pos.y, pos.h);
  }

  requestAnimationFrame(drawFrame);
}

let confAudioBuf = null;
let dropAudioBuf = null;

async function loadAllSounds() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const decode = async (b64) => {
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return audioCtx.decodeAudioData(bytes.buffer);
    };
    if (!btnAudioBuf)  btnAudioBuf  = await decode(BTN_SOUND_B64);
    if (!confAudioBuf) confAudioBuf = await decode(CONF_SOUND_B64);
    if (!dropAudioBuf) dropAudioBuf = await decode(DROP_SOUND_B64);
  } catch(e) {}
}

async function playSound(buf, vol) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    await loadAllSounds();
    if (!buf) return;
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const g = audioCtx.createGain();
    g.gain.value = vol;
    src.connect(g);
    g.connect(audioCtx.destination);
    src.start();
  } catch(e) {}
}
function playBtnSound()  { playSound(btnAudioBuf,  0.5); }
function playConfSound() { playSound(confAudioBuf, 0.5); }
function playDropSound() { playSound(dropAudioBuf, 0.5); }
const CHORD_RATIOS = [[1,1],[1.125,0.7],[1.5,0.5],[2,0.3]]; // Sus2
function pickPitch() { return 1200; }

async function makeReverb(c, duration, decayRate) {
  const len = Math.ceil(c.sampleRate * duration);
  const buf = c.createBuffer(2, len, c.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, decayRate);
  }
  const conv = c.createConvolver();
  conv.buffer = buf;
  return conv;
}

let reverbNode = null; // cache reverb so we don't rebuild every word
async function playShimmer() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const c = audioCtx, now = c.currentTime;

    const base    = pickPitch();
    const decay   = 0.5;
    const stagger = 0.025;
    const attack  = 0.009;
    const vol     = 0.007;
    const reverbMix = 0.7;

    // Build reverb once, reuse after
    if (!reverbNode) reverbNode = await makeReverb(c, decay * 2, 3);

    const dryGain = c.createGain();
    dryGain.gain.value = 1 - reverbMix * 0.6;
    dryGain.connect(c.destination);

    const wetGain = c.createGain();
    wetGain.gain.value = reverbMix * 0.5;
    reverbNode.connect(wetGain);
    wetGain.connect(c.destination);

    CHORD_RATIOS.forEach(([ratio, relVol], i) => {
      const delay = i * stagger;
      const osc = c.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = base * ratio;

      const g = c.createGain();
      g.gain.setValueAtTime(0, now + delay);
      g.gain.linearRampToValueAtTime(vol * relVol, now + delay + attack);
      g.gain.exponentialRampToValueAtTime(0.0001, now + delay + decay);

      osc.connect(g);
      g.connect(dryGain);
      g.connect(reverbNode);

      osc.start(now + delay);
      osc.stop(now + delay + decay + 0.05);
    });
  } catch(e) {}
}

function tryNextWord() {
  if (pendingWords.length === 0) return;
  fwdWord = pendingWords.shift();
  fwdWordW = measure(fwdWord) + 2;
  const pos = getCaretPos();
  fwdStartX = pos.x;
  fwdStartY = pos.y;
  fwdRectW = 0;
  phase = 'expand';
  playShimmer();
}

function queueWord(word) {
  if (!word) return;
  pendingWords.push(word);
  if (phase === 'idle') tryNextWord();
}

function triggerErase() {
  if (phase === 'expand' || phase === 'sweep') {
    displayEl.textContent = committedStr();
    pendingWords = []; phase = 'idle'; fwdRectW = 0;
  }
  if (committedWords.length === 0) return;

  erWord = committedWords[committedWords.length - 1];
  const before = committedWords.slice(0,-1).join(' ');

  const rightPos = getCaretPos();
  erRightX = rightPos.x;
  erY = rightPos.y;
  erH = rightPos.h;

  const leftPos = posForText(before + (before ? ' ' : ''));
  erLeftX = leftPos.x;

  erWordW = (erRightX > erLeftX) ? (erRightX - erLeftX) : measure(erWord);
  if (erRightX <= erLeftX) {
    erLeftX = erRightX - erWordW;
  }

  erCursorX = erRightX;
  phase = 'erase_cover';
}

  const words = transcript.trim().split(/\s+/).filter(Boolean);
  lastFinalWordCount += words.length;
  const handled = committedWords.length + (phase !== 'idle' ? 1 : 0) + pendingWords.length + interimQueued.length;
  words.slice(handled - committedWords.length).forEach(w => queueWord(w));

function drainEraseQueue() {

    const drain = Math.min(eraseQueue, pendingWords.length);

// Single input element for both desktop and mobile.

// On Android GBoard: keydown fires key="Unidentified", so space/backspace

typeInput.addEventListener('keydown', (e) => {

    e.preventDefault();
    const word = typeInput.value.trim();
    if (word) { queueWord(word); typeInput.value = ''; }
    return;
  }
  if (e.key === ' ' || e.key === 'Spacebar') {
    e.preventDefault();
    const word = typeInput.value.trim();
    if (word) { queueWord(word); typeInput.value = ''; }
    return;
  }
  if (e.key === 'Backspace' && typeInput.value === '') {
    e.preventDefault();
    scheduleErase();
  }
});

    if (typeInput.value === '') scheduleErase();
    return;
  }

  // Ignore all other deletions — they are mid-word edits, leave them alone
  if (type.startsWith('delete')) return;

  // For any insertion, check if a space has appeared in the value.
  // This catches GBoard's space (which bypasses keydown) as well as
  // autocomplete completions that include a trailing space.
  const val = typeInput.value;
  if (val.includes(' ')) {
    const parts = val.split(' ');
    const trailing = parts.pop(); // keep text after last space in the field
    parts.forEach(w => { const t = w.trim(); if (t) queueWord(t); });
    typeInput.value = trailing;
  }
});
function clearAll() {
  setMicOff();
  // Turn off type mode silently — drop sound already plays from the button
  if (typeOn) {
    typeOn=false; typeBtn.classList.remove('on'); typeLbl.textContent='Type';
    statusEl.textContent='ready';
    typeInputWrap.classList.remove('visible');
    typeInput.value=''; typeInput.blur();
    positionInputBar();
  }
  committedWords=[]; pendingWords=[]; interimQueued=[];
  lastFinalWordCount=0; phase='idle'; fwdRectW=0;
  displayEl.textContent=''; statusEl.textContent='ready';
}

// Re-sync canvas on resize (handles rotation, browser resize)
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    syncCanvas();
    // Re-measure and re-draw current text after layout settles
    displayEl.textContent = committedStr();
  }, 100);
});

// Handle viewport changes — reposition input bar + sync canvas
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    positionInputBar();
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(syncCanvas, 100);
  });
  window.visualViewport.addEventListener('scroll', positionInputBar);
}

syncCanvas();
positionInputBar();
drawFrame();
</script>
