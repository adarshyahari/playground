
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#root {
  background: #000;
  min-height: 340px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  border-radius: 12px;
  padding: 2.5rem 3rem;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
}
#scene { position: relative; width: 100%; min-height: 140px; }
#canvas { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
#text-layer {
  font-size: 30px; font-weight: 400; color: #fff;
  line-height: 1.5; letter-spacing: -0.01em;
  white-space: pre-wrap; word-break: break-word; min-height: 46px;
  position: relative; z-index: 1;
}
#sizer {
  position: absolute; visibility: hidden;
  font-size: 30px; font-weight: 400;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  letter-spacing: -0.01em; white-space: pre; top:0; left:0; z-index:0;
}
#controls { margin-top: 1.5rem; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
#mic-btn {
  background: #1a1a1a; border: 0.5px solid #444; color: #fff;
  padding: 10px 24px; border-radius: 999px; font-size: 14px;
  cursor: pointer; display:flex; align-items:center; gap:8px;
}
#mic-btn:hover { background: #2a2a2a; }
#mic-btn.on { border-color: #a855f7; color: #d8b4fe; }
#clear-btn {
  background: transparent; border: 0.5px solid #333; color: #555;
  padding: 10px 18px; border-radius: 999px; font-size: 14px; cursor: pointer;
}
#clear-btn:hover { border-color: #555; color: #888; }
.dot { width:8px; height:8px; border-radius:50%; background:#555; }
#mic-btn.on .dot { background:#a855f7; animation: p 1s infinite; }
@keyframes p { 0%,100%{opacity:1}50%{opacity:.3} }
#status { font-size: 13px; color: #666; }
</style>

<div id="root">
  <div id="scene">
    <canvas id="canvas"></canvas>
    <div id="text-layer"><span id="sizer"></span><span id="display-text"></span></div>
  </div>
  <div id="controls">
    <button id="mic-btn" onclick="toggleMic()">
      <span class="dot"></span>
      <span id="lbl">Start speaking</span>
    </button>
    <button id="clear-btn" onclick="clearAll()">Clear</button>
    <span id="status">ready</span>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scene = document.getElementById('scene');
const sizer = document.getElementById('sizer');
const displayEl = document.getElementById('display-text');
const micBtn = document.getElementById('mic-btn');
const lbl = document.getElementById('lbl');
const statusEl = document.getElementById('status');

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) statusEl.textContent = 'Not supported — use Chrome';

let recog = null;
let micOn = false;
let restarting = false;

// Text state — only what's fully revealed
let committedText = '';
// Queue of complete words waiting to animate
let pendingWords = [];

// Glow/cursor animation state
let hue = 270;
let phase = 'idle'; // idle | expand | sweep
let rectX = 0, rectW = 0, rectTargetW = 0;
let sweepWord = '', sweepFull = 0;

// Canvas geometry — computed from a reference char
const FONT_SIZE = 30;
const LINE_HEIGHT = FONT_SIZE * 1.5;

function measure(t) {
  sizer.textContent = t;
  return sizer.offsetWidth;
}

// Get pixel Y of the current line's top and height for the cursor
// We do this by measuring where the text currently sits
function getCursorGeometry() {
  // Use the bounding rect of displayEl relative to scene
  const sceneRect = scene.getBoundingClientRect();
  const textRect = displayEl.getBoundingClientRect();
  const relTop = textRect.top - sceneRect.top;

  // Height of one line
  const capH = FONT_SIZE * 0.74;
  const lineTopOffset = (LINE_HEIGHT - capH) / 2;

  // We need the Y of the LAST line
  // Count lines by comparing text width vs container width
  const containerW = scene.offsetWidth;
  const textW = measure(committedText + (phase !== 'idle' ? ' ' + sweepWord : ''));

  // Approximate which line we're on
  const lineIndex = Math.floor(textW / containerW);
  const lineY = relTop + lineIndex * LINE_HEIGHT + lineTopOffset - 2;

  return { y: lineY, h: capH + 8 };
}

function syncCanvas() {
  canvas.width = scene.offsetWidth;
  canvas.height = Math.max(scene.offsetHeight, 60);
}

function rRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawFrame() {
  syncCanvas();
  hue = (hue + 1.0) % 360;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const geo = getCursorGeometry();
  const ry = geo.y;
  const rh = geo.h;

  // --- Cursor X: always end of committed text on current line ---
  // We measure modulo line width for wrapping
  const containerW = scene.offsetWidth;

  function xOnLine(text) {
    // Full pixel width of text, then mod by container for last-line x
    sizer.textContent = text;
    const full = sizer.offsetWidth;
    return full % containerW;
  }

  const baseX = xOnLine(committedText);

  if (phase === 'expand') {
    rectW += (rectTargetW - rectW) * 0.15;
    if (rectTargetW - rectW < 0.8) { rectW = rectTargetW; phase = 'sweep'; }
  } else if (phase === 'sweep') {
    rectX += 4; rectW -= 4;
    if (rectW <= 3) {
      // Word fully revealed
      rectW = 0; phase = 'idle';
      committedText += (committedText ? ' ' : '') + sweepWord;
      displayEl.textContent = committedText;
      tryNextWord();
    } else {
      // Reveal partial word — show only what cursor has passed
      const frac = Math.max(0, 1 - rectW / sweepFull);
      const partial = sweepWord.slice(0, Math.ceil(sweepWord.length * frac));
      displayEl.textContent = committedText + (committedText ? ' ' : '') + partial;
    }
  }

  // Compute current rect position based on committed text x
  let cursorX;
  if (phase === 'expand') {
    cursorX = baseX + rectW;
  } else if (phase === 'sweep') {
    cursorX = rectX + rectW;
  } else {
    cursorX = baseX;
  }

  // Draw glow rect
  if (rectW > 0.5 && (phase === 'expand' || phase === 'sweep')) {
    const rx = cursorX - rectW;
    const bx = rx + rectW / 2, by = ry + rh / 2;

    // Bloom
    const bloom = ctx.createRadialGradient(bx, by, 0, bx, by, rectW + 30);
    bloom.addColorStop(0, `hsla(${hue},80%,70%,0.2)`);
    bloom.addColorStop(1, `hsla(${hue},80%,70%,0)`);
    ctx.beginPath();
    ctx.ellipse(bx, by, rectW + 30, rh + 20, 0, 0, Math.PI * 2);
    ctx.fillStyle = bloom; ctx.fill();

    // Rect
    const grad = ctx.createLinearGradient(rx, 0, cursorX, 0);
    grad.addColorStop(0, `hsla(${hue},80%,75%,0)`);
    grad.addColorStop(0.35, `hsla(${hue},80%,78%,0.45)`);
    grad.addColorStop(1, `hsla(${hue},80%,85%,0.85)`);
    rRect(rx, ry, rectW, rh, 4);
    ctx.fillStyle = grad; ctx.fill();
  }

  // Draw cursor bar — always at cursorX
  ctx.save();
  ctx.shadowColor = `hsl(${hue},90%,70%)`; ctx.shadowBlur = 10;
  ctx.fillStyle = `hsl(${hue},90%,72%)`;
  rRect(cursorX, ry, 2.5, rh, 1.5);
  ctx.fill();
  ctx.restore();

  requestAnimationFrame(drawFrame);
}

function tryNextWord() {
  if (pendingWords.length === 0) return;
  sweepWord = pendingWords.shift();
  sweepFull = measure(sweepWord) + 2;

  // rectX starts at current end of committed text (on last line)
  const containerW = scene.offsetWidth;
  sizer.textContent = committedText;
  const fullW = sizer.offsetWidth;
  rectX = fullW % containerW + (committedText ? measure(' ') : 0);
  rectW = 0;
  rectTargetW = sweepFull;
  phase = 'expand';
}

// Only called with FINAL results — no interim shown
function queueWords(transcript) {
  const incoming = transcript.trim().split(/\s+/).filter(Boolean);
  // Figure out how many words are already handled
  const committed = committedText.trim().split(/\s+/).filter(w => w.length > 0);
  const alreadyHandled = committed.length + pendingWords.length + (phase !== 'idle' ? 1 : 0);
  const newWords = incoming.slice(alreadyHandled);
  newWords.forEach(w => pendingWords.push(w));
  if (phase === 'idle' && pendingWords.length > 0) tryNextWord();
}

function createRecog() {
  if (!SR) return null;
  const r = new SR();
  r.continuous = false;
  r.interimResults = false; // NO interim — only fire on final
  r.lang = 'en-US';
  r.maxAlternatives = 1;

  r.onstart = () => { restarting = false; statusEl.textContent = 'listening...'; };

  r.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        queueWords(e.results[i][0].transcript);
      }
    }
  };

  r.onerror = (e) => {
    if (e.error === 'not-allowed') {
      statusEl.textContent = 'mic blocked — allow in browser settings';
      setMicOff();
    }
    // no-speech etc — just let onend restart
  };

  r.onend = () => {
    if (micOn && !restarting) {
      restarting = true;
      setTimeout(() => {
        if (micOn) { recog = createRecog(); recog.start(); }
      }, 150);
    }
  };

  return r;
}

function toggleMic() {
  if (!SR) { statusEl.textContent = 'Use Chrome'; return; }
  micOn ? setMicOff() : setMicOn();
}

function setMicOn() {
  micOn = true;
  micBtn.classList.add('on');
  lbl.textContent = 'Stop';
  statusEl.textContent = 'starting...';
  recog = createRecog();
  recog.start();
}

function setMicOff() {
  micOn = false; restarting = false;
  micBtn.classList.remove('on');
  lbl.textContent = 'Start speaking';
  statusEl.textContent = 'ready';
  if (recog) { try { recog.abort(); } catch(e){} recog = null; }
}

function clearAll() {
  setMicOff();
  committedText = ''; pendingWords = []; phase = 'idle'; rectW = 0;
  displayEl.textContent = '';
}

syncCanvas();
drawFrame();
</script>
