
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#root {
  background: #000;
  min-height: 340px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  border-radius: 12px;
  padding: 2.5rem 3rem;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
}
#scene { position: relative; width: 100%; min-height: 140px; }
#canvas { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
#text-layer {
  font-size: 30px; font-weight: 400; color: #fff;
  line-height: 1.5; letter-spacing: -0.01em;
  white-space: pre-wrap; word-break: break-word; min-height: 46px;
  position: relative; z-index: 1;
}
#sizer {
  position: absolute; visibility: hidden;
  font-size: 30px; font-weight: 400;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  letter-spacing: -0.01em; white-space: pre; top:0; left:0;
}
#controls { margin-top: 1.5rem; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
#mic-btn {
  background: #1a1a1a; border: 0.5px solid #444; color: #fff;
  padding: 10px 24px; border-radius: 999px; font-size: 14px;
  cursor: pointer; display:flex; align-items:center; gap:8px;
}
#mic-btn:hover { background: #2a2a2a; }
#mic-btn.on { border-color: #a855f7; color: #d8b4fe; }
#clear-btn {
  background: transparent; border: 0.5px solid #333; color: #555;
  padding: 10px 18px; border-radius: 999px; font-size: 14px; cursor: pointer;
}
#clear-btn:hover { border-color: #555; color: #888; }
.dot { width:8px; height:8px; border-radius:50%; background:#555; }
#mic-btn.on .dot { background:#a855f7; animation: p 1s infinite; }
@keyframes p { 0%,100%{opacity:1}50%{opacity:.3} }
#status { font-size: 13px; color: #666; }
#version { margin-top: 0.75rem; font-size: 11px; color: #333; letter-spacing: 0.04em; }
</style>

<div id="root">
  <div id="scene">
    <canvas id="canvas"></canvas>
    <div id="text-layer"><span id="sizer"></span><span id="display-text"></span></div>
  </div>
  <div id="controls">
    <button id="mic-btn" onclick="toggleMic()">
      <span class="dot"></span>
      <span id="lbl">Start speaking</span>
    </button>
    <button id="clear-btn" onclick="clearAll()">Clear</button>
    <span id="status">ready</span>
  </div>
  <div id="version">v5.0</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scene = document.getElementById('scene');
const sizer = document.getElementById('sizer');
const displayEl = document.getElementById('display-text');
const micBtn = document.getElementById('mic-btn');
const lbl = document.getElementById('lbl');
const statusEl = document.getElementById('status');

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) statusEl.textContent = 'Not supported — use Chrome';

let recog = null;
let micOn = false;

// Text state
let committedText = '';   // fully animated & committed words
let animatedCount = 0;    // how many words have been fully animated
let pendingWords = [];    // words queued to animate next

// Track what we've already queued from interim to avoid re-queuing
let interimQueued = [];   // words already sent to pending from current interim chunk
let lastFinalCount = 0;   // word count after last final result

// Glow/cursor animation
let hue = 270;
let phase = 'idle';
let rectX = 0, rectW = 0, rectTargetW = 0;
let sweepWord = '', sweepFull = 0;

const FONT_SIZE = 30;
const LINE_HEIGHT = FONT_SIZE * 1.5;

function measure(t) { sizer.textContent = t; return sizer.offsetWidth; }

function getCursorGeometry() {
  const sceneRect = scene.getBoundingClientRect();
  const textRect = displayEl.getBoundingClientRect();
  const relTop = textRect.top - sceneRect.top;
  const capH = FONT_SIZE * 0.74;
  const lineTopOffset = (LINE_HEIGHT - capH) / 2;
  const containerW = scene.offsetWidth;
  const textW = measure(committedText + (phase !== 'idle' ? ' ' + sweepWord : ''));
  const lineIndex = Math.floor(textW / containerW);
  return { y: relTop + lineIndex * LINE_HEIGHT + lineTopOffset - 2, h: capH + 8 };
}

function syncCanvas() {
  canvas.width = scene.offsetWidth;
  canvas.height = Math.max(scene.offsetHeight, 60);
}

function rRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawFrame() {
  syncCanvas();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const geo = getCursorGeometry();
  const ry = geo.y, rh = geo.h;
  const containerW = scene.offsetWidth;

  function xOnLine(text) {
    sizer.textContent = text;
    return sizer.offsetWidth % containerW;
  }

  const baseX = xOnLine(committedText);

  if (phase === 'expand') {
    rectW += (rectTargetW - rectW) * 0.15;
    if (rectTargetW - rectW < 0.8) { rectW = rectTargetW; phase = 'sweep'; }
  } else if (phase === 'sweep') {
    rectX += 4; rectW -= 4;
    if (rectW <= 3) {
      rectW = 0; phase = 'idle';
      committedText += (committedText ? ' ' : '') + sweepWord;
      animatedCount++;
      displayEl.textContent = committedText;
      tryNextWord();
    } else {
      const frac = Math.max(0, 1 - rectW / sweepFull);
      const partial = sweepWord.slice(0, Math.ceil(sweepWord.length * frac));
      displayEl.textContent = committedText + (committedText ? ' ' : '') + partial;
    }
  }

  let cursorX;
  if (phase === 'expand') cursorX = baseX + rectW;
  else if (phase === 'sweep') cursorX = rectX + rectW;
  else cursorX = baseX;

  // Glow rect
  if (rectW > 0.5 && phase !== 'idle') {
    const rx = cursorX - rectW;
    const bx = rx + rectW / 2, by = ry + rh / 2;
    const bloom = ctx.createRadialGradient(bx, by, 0, bx, by, rectW + 30);
    bloom.addColorStop(0, `hsla(${hue},80%,70%,0.2)`);
    bloom.addColorStop(1, `hsla(${hue},80%,70%,0)`);
    ctx.beginPath();
    ctx.ellipse(bx, by, rectW + 30, rh + 20, 0, 0, Math.PI * 2);
    ctx.fillStyle = bloom; ctx.fill();

    const grad = ctx.createLinearGradient(rx, 0, cursorX, 0);
    grad.addColorStop(0, `hsla(${hue},80%,75%,0)`);
    grad.addColorStop(0.35, `hsla(${hue},80%,78%,0.45)`);
    grad.addColorStop(1, `hsla(${hue},80%,85%,0.85)`);
    rRect(rx, ry, rectW, rh, 4);
    ctx.fillStyle = grad; ctx.fill();
  }

  // Cursor bar — colored when active, grey when idle/off
  const isActive = micOn && phase !== 'idle';
  if (isActive) hue = (hue + 1.0) % 360;

  ctx.save();
  if (isActive) {
    ctx.shadowColor = `hsl(${hue},90%,70%)`;
    ctx.shadowBlur = 10;
    ctx.fillStyle = `hsl(${hue},90%,72%)`;
  } else {
    ctx.shadowBlur = 0;
    ctx.fillStyle = micOn ? '#555' : '#333';
  }
  rRect(cursorX, ry, 2.5, rh, 1.5);
  ctx.fill();
  ctx.restore();

  requestAnimationFrame(drawFrame);
}

function tryNextWord() {
  if (pendingWords.length === 0) return;
  sweepWord = pendingWords.shift();
  sweepFull = measure(sweepWord) + 2;
  const containerW = scene.offsetWidth;
  sizer.textContent = committedText;
  rectX = sizer.offsetWidth % containerW + (committedText ? measure(' ') : 0);
  rectW = 0; rectTargetW = sweepFull;
  phase = 'expand';
}

// Called with interim transcript — queue only NEW words we haven't queued yet
function handleInterim(transcript) {
  const words = transcript.trim().split(/\s+/).filter(Boolean);
  // Words already handled = committed + interimQueued + currently animating
  const alreadyHandled = lastFinalCount + interimQueued.length + (phase !== 'idle' ? 1 : 0) + pendingWords.length;
  const newWords = words.slice(alreadyHandled);
  if (newWords.length === 0) return;
  newWords.forEach(w => { interimQueued.push(w); pendingWords.push(w); });
  if (phase === 'idle') tryNextWord();
}

// Called when a result is finalised — reconcile committed count
function handleFinal(transcript) {
  const words = transcript.trim().split(/\s+/).filter(Boolean);
  lastFinalCount = words.length;
  // Any words beyond what interim already queued, add them
  const totalQueued = interimQueued.length + (phase !== 'idle' ? 1 : 0) + pendingWords.length;
  const alreadyHandled = lastFinalCount - words.length + totalQueued;
  const newWords = words.slice(interimQueued.length + (phase !== 'idle' ? 1 : 0) + pendingWords.length + animatedCount - animatedCount);

  // Simpler: just make sure all words in final are queued
  const totalAnimated = animatedCount + (phase !== 'idle' ? 1 : 0) + pendingWords.length + interimQueued.length;
  const missing = words.slice(totalAnimated);
  missing.forEach(w => { pendingWords.push(w); });
  interimQueued = [];
  if (phase === 'idle' && pendingWords.length > 0) tryNextWord();
}

function startRecog() {
  if (!SR || !micOn) return;
  recog = new SR();
  recog.continuous = true;
  recog.interimResults = true;
  recog.lang = 'en-US';
  recog.maxAlternatives = 1;

  recog.onstart = () => { statusEl.textContent = 'listening...'; };

  recog.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const transcript = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        handleFinal(transcript);
      } else {
        handleInterim(transcript);
      }
    }
  };

  recog.onerror = (e) => {
    if (e.error === 'not-allowed') {
      statusEl.textContent = 'mic blocked — allow in browser settings';
      setMicOff();
    } else if (e.error !== 'no-speech' && e.error !== 'aborted') {
      // restart on recoverable errors
      setTimeout(() => { if (micOn) startRecog(); }, 300);
    }
  };

  recog.onend = () => {
    // Only restart if we didn't explicitly stop
    if (micOn) setTimeout(() => { if (micOn) startRecog(); }, 200);
  };

  try { recog.start(); } catch(e) {}
}

function toggleMic() {
  if (!SR) { statusEl.textContent = 'Use Chrome'; return; }
  micOn ? setMicOff() : setMicOn();
}

function setMicOn() {
  micOn = true; micBtn.classList.add('on');
  lbl.textContent = 'Stop'; statusEl.textContent = 'starting...';
  lastFinalCount = 0; interimQueued = [];
  startRecog();
}

function setMicOff() {
  micOn = false; micBtn.classList.remove('on');
  lbl.textContent = 'Start speaking'; statusEl.textContent = 'ready';
  if (recog) { try { recog.onend = null; recog.abort(); } catch(e){} recog = null; }
}

function clearAll() {
  setMicOff();
  committedText = ''; animatedCount = 0; pendingWords = [];
  interimQueued = []; lastFinalCount = 0;
  phase = 'idle'; rectW = 0;
  displayEl.textContent = '';
}

syncCanvas();
drawFrame();
</script>
